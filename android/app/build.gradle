plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'org.air2ultra.stereocam'
    compileSdk 34
    ndkVersion project.property('ndk.version')

    defaultConfig {
        applicationId 'org.air2ultra.stereocam'
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName '1.0'
        ndk {
            // x86 omitted: emulators can't see the glasses anyway
            abiFilters 'arm64-v8a', 'armeabi-v7a'
        }
    }

    externalNativeBuild {
        ndkBuild {
            path 'src/main/cpp/Android.mk'
        }
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
    // ONNX Runtime: packages libonnxruntime.so, which native code dlopens
    // to run the XFeat session-map descriptors (see cpp/xr_xfeat.c). The
    // Java API is unused. Otherwise the app sticks to framework APIs +
    // the Kotlin stdlib (added by the Kotlin plugin).
    implementation 'com.microsoft.onnxruntime:onnxruntime-android:1.18.0'
}
