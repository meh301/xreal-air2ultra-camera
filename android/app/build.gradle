plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'org.air2ultra.stereocam'
    compileSdk 34
    ndkVersion project.property('ndk.version')

    defaultConfig {
        applicationId 'org.air2ultra.stereocam'
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName '1.0'
        ndk {
            // x86 omitted: emulators can't see the glasses anyway
            abiFilters 'arm64-v8a', 'armeabi-v7a'
        }
    }

    externalNativeBuild {
        ndkBuild {
            path 'src/main/cpp/Android.mk'
        }
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }
}

// no dependencies block: the app deliberately uses only framework APIs +
// the Kotlin stdlib (added by the Kotlin plugin)
