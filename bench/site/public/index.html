<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SLAM Benchmark Explorer</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <div class="hrow">
    <h1>SLAM Benchmark Explorer</h1>
    <div class="seg" id="theme-seg" role="tablist" aria-label="theme">
      <button data-t="auto" class="on">Auto</button><button data-t="light">Light</button><button data-t="dark">Dark</button>
    </div>
  </div>
  <div class="sub" id="meta-line">loading…</div>
  <nav id="tabs"></nav>
  <div id="filters">
    <span class="flabel">arms</span><span id="arm-chips"></span>
    <span class="sep"></span>
    <label class="chk"><input type="checkbox" id="metric-rte"> RTE (not ATE)</label>
  </div>
</header>
<main id="view"></main>
<script src="app.js"></script>
</body>
</html>
